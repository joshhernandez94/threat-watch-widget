<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threat Watch</title>
  <style>
    * { box-sizing: border-box; }

    :root{
  --bg: #f8f9fb;
  --bg-2: #ffffff;
  --bg-3: #f3f4f6;
  --border: #e5e7eb;
  --border-soft: #edf0f2;
  --text: #111827;
  --muted: #6b7280;
  --muted-2: #94a3b8;
  --headline: #111827;

  --critical-bg: rgba(239,68,68,0.10);
  --critical-border: rgba(239,68,68,0.30);

  --high-bg: rgba(245,158,11,0.12);
  --high-border: rgba(245,158,11,0.32);

  --alert-bg: rgba(59,130,246,0.10);
  --alert-border: rgba(59,130,246,0.28);

  --shadow: 0 6px 20px rgba(0,0,0,0.08);
}

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .widget {
  width: 100%;
  height: 360px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 18px;
  background: var(--bg-2); /* KEY CHANGE */
  box-shadow: var(--shadow);
  padding: 14px;

  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.2) transparent;
}

    .widget::-webkit-scrollbar { width: 8px; }
    .widget::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.2);
  border-radius: 999px;
}

    .header {
  position: sticky;
  top: 0;
  z-index: 10;

  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;

  margin-bottom: 12px;
  padding-bottom: 10px;

  background: var(--bg-2); /* KEY CHANGE */
  border-bottom: 1px solid var(--border);
}

    .title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.2px;
    }

    .sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
    }

    .status {
  flex: 0 0 auto;
  font-size: 11px;
  color: var(--muted);
  padding: 5px 9px;
  border-radius: 999px;
  border: 1px solid var(--border-soft);
  background: var(--bg-3);
  white-space: nowrap;
  text-align: right;
}

    .feed {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px;
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      background: var(--bg-2);
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

   .item:hover {
  transform: translateY(-1px);
  border-color: var(--border);
  box-shadow: 0 4px 14px rgba(0,0,0,0.06);
}

    .icon-wrap {
  width: 38px;
  height: 38px;
  min-width: 38px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border-soft);
  background: var(--bg-3);
  display: flex;
  align-items: center;
  justify-content: center;
}

    .icon-wrap img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    .icon-fallback {
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
  opacity: 0.85;
}

    .content {
      min-width: 0;
      flex: 1 1 auto;
    }

    .topline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
  padding: 4px 8px;
  border-radius: 999px;
  text-transform: uppercase;
  border: 1px solid transparent;

  color: var(--text); /* ADD THIS */
}

 .badge.critical {
  background: var(--critical-bg);
  border-color: var(--critical-border);
  color: #b91c1c;
}

.badge.high {
  background: var(--high-bg);
  border-color: var(--high-border);
  color: #b45309;
}

.badge.alert {
  background: var(--alert-bg);
  border-color: var(--alert-border);
  color: #1d4ed8;
}

    .vendor {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .headline {
      margin: 0 0 6px 0;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--headline);
      display: block;
      word-break: break-word;
    }

    .headline a {
      color: var(--headline);
      text-decoration: none;
    }

    .headline a:hover {
  text-decoration: underline;
  color: #2563eb; /* subtle blue hover like Microsoft */
}

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--muted-2);
    }

    .dot { opacity: 0.5; }

    .loading, .empty, .error {
      font-size: 13px;
      color: var(--muted);
      padding: 8px 2px;
    }

    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--muted-2);
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
    }

    .footer a:hover {
  text-decoration: underline;
  color: #2563eb;
}
  </style>
</head>
<body>
  <div class="widget">
    <div class="header">
      <div>
        <div class="title">Threat Watch</div>
        <div class="sub">Vendor-related exploit and advisory activity</div>
      </div>
      <div class="status" id="updated">Loading...</div>
    </div>

    <div id="feed" class="feed">
      <div class="loading">Loading threat feed...</div>
    </div>

    <div class="footer">
      <span id="footerSummary">Balancing vendor results</span>
      <a href="https://www.exploit-db.com/" target="_blank" rel="noopener noreferrer">Open Exploit-DB</a>
    </div>
  </div>

  <script>
    const MAX_TOTAL_ITEMS = 15;
    const MAX_PER_VENDOR = 6;

    const FEEDS = [
      {
        name: "Microsoft",
        vendor: "Microsoft",
        url: "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent("https://msrc.microsoft.com/update-guide/rss"),
        sourceLabel: "MSRC"
      },
      {
        name: "Cisco",
        vendor: "Cisco",
        url: "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent("https://sec.cloudapps.cisco.com/security/center/psirtrss20/CiscoSecurityAdvisory.xml"),
        sourceLabel: "Cisco"
      },
      {
        name: "ExploitDB",
        vendor: null,
        url: "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent("https://www.exploit-db.com/rss.xml"),
        sourceLabel: "Exploit-DB"
      }
    ];

    const vendorKeywords = {
      Microsoft: ["microsoft", "windows", "office", "exchange", "sharepoint", "azure", "outlook", "word", "excel", "teams"],
      Cisco: ["cisco", "ios xe", "ios", "asa", "nexus", "firepower", "meraki", "catalyst", "webex", "ise"],
      SonicWall: ["sonicwall", "sonicos", "sma", "netextender"],
      Dell: ["dell", "idrac", "poweredge", "secure connect gateway"],
      Lenovo: ["lenovo", "thinkpad", "thinkcentre", "bios", "system update"],
      Aruba: ["aruba", "instantos", "arubaos", "aruba central"],
      HPE: ["hpe", "hewlett packard", "proliant", "ilo"]
    };

    const excludedKeywords = [
      "wordpress",
      "wp plugin",
      "wp theme",
      "woocommerce",
      "elementor"
    ];

    const vendorIcons = {
      microsoft: "https://cdn.simpleicons.org/microsoft/ffffff",
      cisco: "https://cdn.simpleicons.org/cisco/ffffff",
      sonicwall: "https://www.sonicwall.com/favicon.ico",
      dell: "https://cdn.simpleicons.org/dell/ffffff",
      lenovo: "https://cdn.simpleicons.org/lenovo/ffffff",
      aruba: "https://cdn.simpleicons.org/hewlettpackardenterprise/ffffff",
      hpe: "https://cdn.simpleicons.org/hewlettpackardenterprise/ffffff"
    };

    const feedEl = document.getElementById("feed");
    const updatedEl = document.getElementById("updated");
    const footerSummaryEl = document.getElementById("footerSummary");

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, m => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function stripHtml(html) {
      return String(html || "")
        .replace(/<[^>]*>/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isExcluded(title = "", description = "") {
      const haystack = `${title} ${description}`.toLowerCase();
      return excludedKeywords.some(k => haystack.includes(k));
    }

    function detectVendor(title = "", description = "") {
      const haystack = `${title} ${description}`.toLowerCase();
      for (const [vendor, keywords] of Object.entries(vendorKeywords)) {
        if (keywords.some(k => haystack.includes(k))) return vendor;
      }
      return null;
    }

    function getVendorIcon(vendor) {
      return vendorIcons[(vendor || "").toLowerCase()] || "";
    }

    function getVendorInitials(vendor) {
      return (vendor || "AL")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(p => p[0])
        .join("")
        .toUpperCase();
    }

    function getSeverity(title = "", description = "") {
      const t = `${title} ${description}`.toLowerCase();

      if (
        t.includes("remote code execution") ||
        t.includes("rce") ||
        t.includes("authentication bypass") ||
        t.includes("auth bypass") ||
        t.includes("zero-day") ||
        t.includes("0day") ||
        t.includes("actively exploited")
      ) return { label: "Critical", cls: "critical" };

      if (
        t.includes("privilege escalation") ||
        t.includes("sql injection") ||
        t.includes("command injection") ||
        t.includes("arbitrary file upload") ||
        t.includes("buffer overflow") ||
        t.includes("bypass") ||
        t.includes("exploit")
      ) return { label: "High", cls: "high" };

      return { label: "Alert", cls: "alert" };
    }

    function buildHeadline(item) {
      const cleanTitle = stripHtml(item.title || "");
      const cleanDesc = stripHtml(item.description || item.content || "");

      if (cleanTitle && cleanTitle.length > 5) return cleanTitle;
      if (cleanDesc && cleanDesc.length > 12) {
        return cleanDesc.slice(0, 140) + (cleanDesc.length > 140 ? "..." : "");
      }
      return "Open advisory details";
    }

    function normalizeItem(item, forcedVendor, sourceLabel) {
      const rawTitle = item.title || "";
      const rawDescription = item.description || item.content || "";

      if (isExcluded(rawTitle, rawDescription)) return null;

      const vendor = forcedVendor || detectVendor(rawTitle, rawDescription);
      if (!vendor) return null;

      const title = buildHeadline(item);

      if (isExcluded(title, rawDescription)) return null;

      return {
        vendor,
        title,
        rawTitle,
        description: rawDescription,
        link: item.link || "#",
        pubDate: item.pubDate || item.isoDate || "",
        source: sourceLabel,
        severity: getSeverity(rawTitle, rawDescription)
      };
    }

    async function fetchFeed(feed) {
      try {
        const res = await fetch(feed.url);
        const data = await res.json();
        const items = Array.isArray(data.items) ? data.items : [];
        return {
          feed: feed.name,
          normalized: items
            .map(item => normalizeItem(item, feed.vendor, feed.sourceLabel))
            .filter(Boolean)
        };
      } catch (e) {
        console.error("Feed failed:", feed.name, e);
        return {
          feed: feed.name,
          normalized: []
        };
      }
    }

    function dedupe(items) {
      const seen = new Set();
      return items.filter(item => {
        const key = `${item.vendor}|${item.title}|${item.source}`.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function balanceVendors(items, maxPerVendor, maxTotal) {
      const sorted = [...items].sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));
      const vendorCounts = {};
      const chosen = [];

      for (const item of sorted) {
        const count = vendorCounts[item.vendor] || 0;
        if (count >= maxPerVendor) continue;
        chosen.push(item);
        vendorCounts[item.vendor] = count + 1;
        if (chosen.length >= maxTotal) break;
      }

      return chosen;
    }

    async function loadThreatFeed() {
      updatedEl.textContent = "Loading...";
      feedEl.innerHTML = '<div class="loading">Loading threat feed...</div>';

      const results = await Promise.all(FEEDS.map(fetchFeed));

      let items = results.flatMap(r => r.normalized);
      items = dedupe(items);
      items = balanceVendors(items, MAX_PER_VENDOR, MAX_TOTAL_ITEMS);

      const vendorBreakdown = {};
      for (const item of items) {
        vendorBreakdown[item.vendor] = (vendorBreakdown[item.vendor] || 0) + 1;
      }

      footerSummaryEl.textContent = Object.entries(vendorBreakdown)
        .map(([vendor, count]) => `${vendor}: ${count}`)
        .join(" | ") || "No items";

      updatedEl.textContent = `${items.length} items`;

      if (!items.length) {
        feedEl.innerHTML = '<div class="empty">No matching vendor items found.</div>';
        return;
      }

      feedEl.innerHTML = items.map(item => {
        const icon = getVendorIcon(item.vendor);
        const pubDate = item.pubDate ? new Date(item.pubDate).toLocaleDateString() : "Recent";

        return `
          <div class="item">
            <div class="icon-wrap">
              ${
                icon
                  ? `<img src="${icon}" alt="${escapeHtml(item.vendor)} icon" onerror="this.parentNode.innerHTML='<div class=&quot;icon-fallback&quot;>${escapeHtml(getVendorInitials(item.vendor))}</div>';">`
                  : `<div class="icon-fallback">${escapeHtml(getVendorInitials(item.vendor))}</div>`
              }
            </div>
            <div class="content">
              <div class="topline">
                <span class="badge ${item.severity.cls}">${escapeHtml(item.severity.label)}</span>
                <span class="vendor">${escapeHtml(item.vendor)}</span>
              </div>
              <div class="headline">
                <a href="${item.link}" target="_blank" rel="noopener noreferrer">
                  ${escapeHtml(item.title)}
                </a>
              </div>
              <div class="meta">
                <span>${escapeHtml(item.source)}</span>
                <span class="dot">•</span>
                <span>${escapeHtml(pubDate)}</span>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    loadThreatFeed();
    setInterval(loadThreatFeed, 1000 * 60 * 30);
  </script>
</body>
</html>
