<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Threat Watch</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Segoe UI,Arial;
background:transparent;
color:white;
}

.widget{
height:360px;
overflow-y:auto;
border-radius:14px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
padding:14px;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.title{
font-size:18px;
font-weight:700;
}

.sub{
font-size:12px;
color:#a7a7a7;
}

.item{
display:flex;
gap:10px;
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,.06);
margin-bottom:8px;
background:rgba(255,255,255,.03);
}

.item:hover{
background:rgba(255,255,255,.06);
}

.icon{
width:34px;
height:34px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.08);
font-size:11px;
font-weight:700;
}

.content{
flex:1;
}

.badge{
font-size:10px;
padding:3px 6px;
border-radius:999px;
margin-bottom:5px;
display:inline-block;
}

.critical{
background:rgba(239,68,68,.18);
border:1px solid rgba(239,68,68,.4);
}

.high{
background:rgba(245,158,11,.18);
border:1px solid rgba(245,158,11,.4);
}

.alert{
background:rgba(96,165,250,.18);
border:1px solid rgba(96,165,250,.4);
}

.headline{
font-size:13px;
font-weight:600;
margin-bottom:4px;
}

.meta{
font-size:11px;
color:#a7a7a7;
}

.loading,.empty,.error{
font-size:13px;
color:#aaa;
}

</style>
</head>

<body>

<div class="widget">

<div class="header">
<div>
<div class="title">Threat Watch</div>
<div class="sub">Vendor-related exploit activity</div>
</div>
</div>

<div id="feed" class="loading">Loading threat feed...</div>

</div>

<script>

const vendorKeywords = {

Microsoft:["microsoft","windows","office","exchange","sharepoint","azure"],

Cisco:["cisco","ios","asa","nexus","firepower","meraki"],

Lenovo:["lenovo","thinkpad"],

Dell:["dell","idrac","poweredge"],

SonicWall:["sonicwall"],

Aruba:["aruba","instantos"],

HPE:["hpe","hewlett","proliant"]

};

function detectVendor(title){

const t = title.toLowerCase();

for(const vendor in vendorKeywords){

if(vendorKeywords[vendor].some(k=>t.includes(k))){

return vendor;

}

}

return null;

}

function severity(title){

const t=title.toLowerCase();

if(t.includes("rce")||t.includes("remote code execution")||t.includes("auth bypass"))
return["Critical","critical"];

if(t.includes("privilege escalation")||t.includes("sql injection")||t.includes("command injection"))
return["High","high"];

return["Alert","alert"];

}

fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.exploit-db.com/rss.xml")

.then(r=>r.json())

.then(data=>{

const feed=document.getElementById("feed");

const items=data.items
.map(i=>{
const vendor=detectVendor(i.title);
return vendor?{...i,vendor}:null;
})
.filter(Boolean)
.slice(0,8);

if(!items.length){

feed.className="empty";
feed.innerHTML="No vendor exploits currently detected.";

return;
}

feed.className="";

feed.innerHTML=items.map(item=>{

const sev=severity(item.title);

return `

<div class="item">

<div class="icon">${item.vendor.substring(0,2)}</div>

<div class="content">

<div class="badge ${sev[1]}">${sev[0]}</div>

<div class="headline">

<a href="${item.link}" target="_blank">

${item.title}

</a>

</div>

<div class="meta">

${item.vendor} • Exploit-DB • ${new Date(item.pubDate).toLocaleDateString()}

</div>

</div>

</div>

`;

}).join("");

})

.catch(()=>{

document.getElementById("feed").innerHTML="Could not load threat feed.";

});

</script>

</body>
</html>
